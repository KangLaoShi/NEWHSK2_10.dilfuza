            if (e) e.stopPropagation();
            state.flashcards.isFlipped = false;
            state.flashcards.currentIndex = (state.flashcards.currentIndex + 1) % VOCABULARY.length;
            renderApp();
        };

        window.prevCard = (e) => {
            if (e) e.stopPropagation();
            state.flashcards.isFlipped = false;
            state.flashcards.currentIndex = (state.flashcards.currentIndex - 1 + VOCABULARY.length) % VOCABULARY.length;
            renderApp();
        };

        // Vocab Test Handlers
        window.generateVocabTest = () => {
            const shuffled = [...VOCABULARY].sort(() => 0.5 - Math.random());
            const testQuestions = shuffled.map((vocab) => {
                const options = [vocab.uz];
                while (options.length < 4) {
                    const randomVocab = VOCABULARY[Math.floor(Math.random() * VOCABULARY.length)];
                    if (!options.includes(randomVocab.uz)) {
                        options.push(randomVocab.uz);
                    }
                }
                return {
                    hanzi: vocab.hanzi,
                    answer: vocab.uz,
                    options: options.sort(() => 0.5 - Math.random())
                };
            });
            state.vocabTest = {
                questions: testQuestions,
                currentQ: 0,
                score: 0,
                showResult: false,
                selected: null
            };
            renderApp();
        };

        window.handleVocabAnswer = (opt) => {
            if (state.vocabTest.selected) return;
            state.vocabTest.selected = opt;
            if (opt === state.vocabTest.questions[state.vocabTest.currentQ].answer) {
                state.vocabTest.score++;
            }
            renderApp();
            
            setTimeout(() => {
                if (state.vocabTest.currentQ + 1 < state.vocabTest.questions.length) {
                    state.vocabTest.currentQ++;
                    state.vocabTest.selected = null;
                } else {
                    state.vocabTest.showResult = true;
                }
                renderApp();
            }, 1000);
        };

        // Grammar Test Handlers
        window.handleGrammarSelect = (qIdx, optIdx) => {
            if (state.grammarTest.submitted) return;
            state.grammarTest.answers[qIdx] = optIdx;
            renderApp();
        };

        window.submitGrammarTest = () => {
            state.grammarTest.submitted = true;
            renderApp();
        };

        window.resetGrammarTest = () => {
            state.grammarTest.submitted = false;
            state.grammarTest.answers = {};
            renderApp();
        };

        // Fill Blanks Handlers
        window.handleFillSelect = (idx, value) => {
            if (state.fillBlanks.submitted) return;
            state.fillBlanks.answers[idx] = value;
            renderApp();
        };

        window.submitFillBlanks = () => {
            state.fillBlanks.submitted = true;
            renderApp();
        };

        window.resetFillBlanks = () => {
            state.fillBlanks.submitted = false;
            state.fillBlanks.answers = {};
            renderApp();
        };

        function getGrammarTestHTML() {
            let score = 0;
            GRAMMAR_QUESTIONS.forEach((q, idx) => {
                if (state.grammarTest.answers[idx] === q.answer) score++;

            let questionsHTML = GRAMMAR_QUESTIONS.map((q, idx) => {
                let optionsHTML = q.options.map((opt, optIdx) => {

                    if (state.grammarTest.submitted) {
                        if (optIdx === q.answer) {

                        </p>

                        <div class="flex flex-wrap gap-3 mb-10 p-6 bg-slate-900/50 rounded-2xl border border-slate-700/50 justify-center">
                            ${wordsTagsHTML}
                        </div>

                        <div class="space-y-6">
                            ${questionsHTML}
                        </div>

                        ${bottomHTML}
                    </div>
                </div>
            `;
        }

        // --- MAIN RENDER CYCLE ---
        function renderApp() {
            renderTabs();
            
            const container = document.getElementById('main-content');
            switch (state.activeTab) {
                case 'flashcards': container.innerHTML = getFlashcardsHTML(); break;
                case 'vocabTest': container.innerHTML = getVocabTestHTML(); break;
                case 'dialogues': container.innerHTML = getDialoguesHTML(); break;
                case 'grammar': container.innerHTML = getGrammarHTML(); break;
                case 'grammarTest': container.innerHTML = getGrammarTestHTML(); break;
                case 'fillBlanks': container.innerHTML = getFillBlanksHTML(); break;
            }
            
            // Initialize lucide icons for newly rendered HTML
            lucide.createIcons();
        }

        // Init App
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            
            // Pre-generate vocab test in background to be ready
            const shuffled = [...VOCABULARY].sort(() => 0.5 - Math.random());
            state.vocabTest.questions = shuffled.map((vocab) => {
                const options = [vocab.uz];
                while (options.length < 4) {
                    const randomVocab = VOCABULARY[Math.floor(Math.random() * VOCABULARY.length)];
                    if (!options.includes(randomVocab.uz)) options.push(randomVocab.uz);
                }
                return { hanzi: vocab.hanzi, answer: vocab.uz, options: options.sort(() => 0.5 - Math.random()) };
            });
        });
    </script>
</body>
</html>
